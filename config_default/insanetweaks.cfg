##########################################################################################################
# [ 4 ] client & debug
#--------------------------------------------------------------------------------------------------------#
# Visual toggles and debugging tools.
##########################################################################################################

"[ 4 ] client & debug" {
    # Whether to display debug info for various mod mechanics. I highly urge you to keep it on until the mod is in its alpha version.
    B:"Display DEBUG INFO"=false

    # Should mod display info whether he found any cursed items in players inventory on death
    B:"Display info on death"=false

    # Hides the CLEANSE effect icon and text from the HUD and inventory effect panel.
    # Enable this flag to suppress the effect from appearing in the GUI entirely.
    # The mechanic itself still works regardless of this setting.
    # Intended as a temporary toggle while the effect's visuals are being refined.
    B:"Hide Cleanse Effect from GUI"=true
}


