# Configuration file

##########################################################################################################
# [ 1 ] modules & integrations
#--------------------------------------------------------------------------------------------------------#
# Toggle main systems and cross-mod integrations.
##########################################################################################################

"[ 1 ] modules & integrations" {
    # Enables the Bauble Fruit system. Bauble Fruits are one-time consumable items that permanently
    # grant the player an additional bauble slot when eaten.
    # Requires BaublesEX (v2.0.0+) to function. Does nothing if only the original Baubles (v1.5.x) is installed.
    B:"Enable Bauble Fruits"=true

    # Registers Cost, Potency and Speedcast Core items for use with Electroblob's Wizardry armor upgrades. Disable if you don't use EBWizardry.
    B:"Enable Custom Cores (EBWizardry)"=true

    # Enables the SRParasites and Electroblob's Wizardry Bridge. This includes the evolving Living Armor, Sentient Spellblades, and the Sentient Aegis shield.
    B:"Enable SRP-EBWizardry Bridge"=true

    # Enables the custom Reskillable trait module. Requires Reskillable. The mod preserves the legacy compatskills namespace for save compatibility and may update reskillable.cfg with an automatic backup.
    B:"Enable Skills Module"=false

    # Registers all InsaneTweaks custom Electroblob's Wizardry spells. Disable this to remove every spell added by the mod from the spell registry.
    B:"Enable Spells"=true
}


##########################################################################################################
# [ 2 ] tweaks & fixes
#--------------------------------------------------------------------------------------------------------#
# Configure specific bugfixes and mechanic alterations.
##########################################################################################################

"[ 2 ] tweaks & fixes" {
    # Additional effects removed by the CLEANSE effect, on top of all effects where isBeneficial() == false.
    # Add effect IDs here if a mod's negative effect is not getting removed automatically.
    # Example: minecraft:glowing
    S:"Cleanse Effect List" <
        srparasites:novision
        srparasites:prey
        srparasites:viral
     >

    # Prevents the Enigmatic Legacy 'Cursed Ring' from forcing summoned creatures (e.g. Fer Cow Minion) to attack their own caster.
    # When enabled, all Electroblob's Wizardry summoned creatures correctly report as being 'on the same team' as their owner,
    # which makes the Cursed Ring's anger loop skip them entirely.
    # Safe to leave enabled even if Enigmatic Legacy is not installed — the fix costs nothing when the ring is absent.
    B:"Enable Cursed Ring Minion Fix"=true
}


