"[ 5 ] tombstone tweaks" {
    # Removes the vanilla Tombstone recipe to craft an Enchanted Grave Key using an Ender Pearl. InsaneTweaks will use its own recipe system if needed.
    B:"Disable Enchant Key Recipe"=true

    # Fixes the Curse of Possession exploit with Corail Tombstone. Cursed items will now properly vanish on death instead of hiding in your grave. Use /restorecursed to get them back
    B:"Enable Curse of Possession Patch"=false

    # Master switch for all Corail Tombstone tweaks. If false, no Tombstone related tweaks will be applied.
    B:"Enable Tombstone Tweaks"=false

    ##########################################################################################################
    # perk: alchemist
    #--------------------------------------------------------------------------------------------------------#
    # Controls the Alchemist perk (scroll duration bonus). Native max level: 5
